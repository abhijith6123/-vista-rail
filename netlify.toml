# Netlify configuration for the VistaRail Next.js app.
# Netlify auto-detects Next.js and applies its official Next.js Runtime
# (serverless rendering, image handling, etc.) — we only pin the build
# command and a Node version that satisfies Next.js 16 (needs Node >= 20.9).

[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
